<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-card {
            width: 450px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { font-size: 28px; color: white; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 18px; position: relative; }
        .input-group label { display: block; color: white; font-size: 14px; margin-bottom: 5px; }
        .input-group input {
            width: 100%; height: 42px; padding: 0 12px;
            border: 1px solid rgba(255,255,255,0.4); border-radius: 8px;
            background: rgba(255,255,255,0.2); color: white; font-size: 14px;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.7); }
        .input-group .error-msg {
            color: #ffaaaa;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-row input { flex: 1; }
        .captcha-img {
            width: 100px; height: 42px; background: #2c3e50; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: monospace; font-size: 22px; font-weight: bold;
            letter-spacing: 5px; color: #ecf0f1; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .captcha-refresh {
            font-size: 20px; cursor: pointer; color: white;
            background: rgba(255,255,255,0.2); width: 36px; height: 42px;
            display: flex; align-items: center; justify-content: center; border-radius: 8px;
        }
        .radio-group { display: flex; gap: 30px; padding: 8px 0; color: white; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
        button {
            width: 100%; height: 48px; background: white; color: black;
            border: none; border-radius: 10px; font-size: 16px;
            font-weight: 500; cursor: pointer; margin: 20px 0 15px;
        }
        button:hover { background: #f0f0f0; }
        .login-link { text-align: center; font-size: 14px; color: white; }
        .login-link a { color: white; text-decoration: none; border-bottom: 1px dotted rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>用户注册</h2>
        <form>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="regUser" placeholder="请输入用户名" oninput="checkUsername()">
                <div class="error-msg" id="userError">用户名已存在</div>
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="regPass" placeholder="请输入密码">
            </div>
            <div class="input-group">
                <label>确认密码</label>
                <input type="password" id="confirmPass" placeholder="请再次输入密码">
                <div class="error-msg" id="pwdError">两次密码不一致</div>
            </div>
            <div class="input-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" oninput="checkPhone()">
                <div class="error-msg" id="phoneError">请输入11位手机号</div>
            </div>
            <div class="input-group">
                <label>验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captchaInput" placeholder="请输入验证码">
                    <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()">
                        <span id="captchaText"></span>
                    </div>
                    <div class="captcha-refresh" onclick="refreshCaptcha()">⟳</div>
                </div>
            </div>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱">
            </div>
            <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="男"> 男</label>
                    <label><input type="radio" name="gender" value="女"> 女</label>
                </div>
            </div>
            <button type="button" onclick="register()">注册</button>
            <div class="login-link">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </form>
    </div>

    <script>
        let currentCaptcha = '';

        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 4; i++) result += chars[Math.floor(Math.random() * chars.length)];
            return result;
        }

        function refreshCaptcha() {
            currentCaptcha = generateCaptcha();
            document.getElementById('captchaText').innerHTML = currentCaptcha;
        }

        function checkUsername() {
            const username = document.getElementById('regUser').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const exists = users.some(u => u.username === username);
            const errorDiv = document.getElementById('userError');
            if (exists && username !== '') {
                errorDiv.style.display = 'block';
                return false;
            } else {
                errorDiv.style.display = 'none';
                return true;
            }
        }

        function checkPhone() {
            const phone = document.getElementById('phone').value;
            const errorDiv = document.getElementById('phoneError');
            if (phone.length > 0 && !/^1[3-9]\d{9}$/.test(phone)) {
                errorDiv.style.display = 'block';
                return false;
            } else {
                errorDiv.style.display = 'none';
                return true;
            }
        }

        function register() {
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const gender = document.querySelector('input[name="gender"]:checked')?.value || '';
            const captchaInput = document.getElementById('captchaInput').value;

            if (!username || !password || !phone || !email) {
                alert('请填写完整信息');
                return;
            }
            if (!checkUsername()) {
                alert('用户名已存在');
                return;
            }
            if (password !== confirm) {
                document.getElementById('pwdError').style.display = 'block';
                return;
            } else {
                document.getElementById('pwdError').style.display = 'none';
            }
            if (!checkPhone()) {
                alert('请输入正确的11位手机号');
                return;
            }
            if (captchaInput.toUpperCase() !== currentCaptcha) {
                alert('验证码错误');
                refreshCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({ username, password, phone, email, gender });
            localStorage.setItem('users', JSON.stringify(users));

            alert('注册成功！请登录');
            window.location.href = 'login.html';
        }

        refreshCaptcha();
        document.getElementById('confirmPass').addEventListener('input', function() {
            const pwd = document.getElementById('regPass').value;
            const confirm = this.value;
            const errorDiv = document.getElementById('pwdError');
            if (pwd !== confirm && confirm !== '') {
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
