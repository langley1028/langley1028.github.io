<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-card {
            width: 450px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 25px;
            font-weight: 500;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: white;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .input-group input {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            outline: none;
            border-color: white;
            background: rgba(255, 255, 255, 0.3);
        }

        .captcha-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .captcha-row input {
            flex: 1;
        }

        .captcha-img {
            width: 100px;
            height: 42px;
            background: #2c3e50;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 5px;
            color: #ecf0f1;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .captcha-refresh {
            font-size: 20px;
            cursor: pointer;
            color: white;
            background: rgba(255,255,255,0.2);
            width: 36px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: 0.2s;
        }

        .captcha-refresh:hover {
            background: rgba(255,255,255,0.4);
        }

        .radio-group {
            display: flex;
            gap: 30px;
            padding: 8px 0;
            color: white;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
            font-weight: normal;
        }

        button {
            width: 100%;
            height: 48px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin: 20px 0 15px;
            transition: 0.2s;
        }

        button:hover {
            background: #f0f0f0;
            transform: scale(1.02);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: white;
        }

        .login-link a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted rgba(255,255,255,0.5);
        }

        .login-link a:hover {
            border-bottom-color: white;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>用户注册</h2>
        <form>
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="regUser" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="regPass" placeholder="请输入密码">
            </div>
            <div class="input-group">
                <label>确认密码</label>
                <input type="password" id="confirmPass" placeholder="请再次输入密码">
            </div>
            <div class="input-group">
                <label>手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号">
            </div>
            <div class="input-group">
                <label>验证码</label>
                <div class="captcha-row">
                    <input type="text" id="captchaInput" placeholder="请输入验证码">
                    <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()">
                        <span id="captchaText"></span>
                    </div>
                    <div class="captcha-refresh" onclick="refreshCaptcha()">⟳</div>
                </div>
            </div>
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱">
            </div>
            <div class="input-group">
                <label>性别</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="男"> 男</label>
                    <label><input type="radio" name="gender" value="女"> 女</label>
                </div>
            </div>
            <button type="button" onclick="register()">注册</button>
            <div class="login-link">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </form>
    </div>

    <script>
        let currentCaptcha = '';

        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 4; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        }

        function refreshCaptcha() {
            currentCaptcha = generateCaptcha();
            document.getElementById('captchaText').innerHTML = currentCaptcha;
        }

        function register() {
            const username = document.getElementById('regUser').value;
            const password = document.getElementById('regPass').value;
            const confirm = document.getElementById('confirmPass').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const captchaInput = document.getElementById('captchaInput').value;

            if (!username || !password || !phone || !email) {
                alert('请填写完整信息');
                return;
            }
            if (password !== confirm) {
                alert('两次密码不一致');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的11位手机号');
                return;
            }
            if (captchaInput.toUpperCase() !== currentCaptcha) {
                alert('验证码错误');
                refreshCaptcha();
                document.getElementById('captchaInput').value = '';
                return;
            }

            localStorage.setItem('username', username);
            localStorage.setItem('password', password);
            localStorage.setItem('phone', phone);
            localStorage.setItem('email', email);

            alert('注册成功！请登录');
            window.location.href = 'login.html';
        }

        refreshCaptcha();
    </script>
</body>
</html>
