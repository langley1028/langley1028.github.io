<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 360px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }
        h2 { font-size: 28px; color: white; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: white; font-size: 14px; margin-bottom: 6px; }
        .input-group input {
            width: 100%; height: 45px; padding: 0 15px;
            border: 1px solid rgba(255,255,255,0.4); border-radius: 10px;
            background: rgba(255,255,255,0.2); color: white; font-size: 14px;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.7); }
        button {
            width: 100%; height: 48px; background: white; color: black;
            border: none; border-radius: 10px; font-size: 16px;
            font-weight: 500; cursor: pointer; margin-bottom: 20px;
        }
        button:hover { background: #f0f0f0; }
        .register { text-align: center; font-size: 14px; color: white; }
        .register a { color: white; text-decoration: none; border-bottom: 1px dotted rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>登录</h2>
        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button onclick="login()">立即登录</button>
        <div class="register">
            <a href="register.html">没有账号？立即注册</a>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(user => user.username === u && user.password === p);
            
            if (user || (u === 'admin' && p === 'admin')) {
                sessionStorage.setItem('isLoggedIn', 'true');
                const redirectPage = sessionStorage.getItem('redirectAfterLogin');
                if (redirectPage) {
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectPage;
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
