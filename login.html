<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 360px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 25px;
            font-weight: 500;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: white;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        .input-group input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            outline: none;
            border-color: white;
            background: rgba(255, 255, 255, 0.3);
        }

        .row-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: white;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            cursor: pointer;
        }

        .forgot a {
            color: white;
            text-decoration: none;
            border-bottom: 1px dotted rgba(255,255,255,0.5);
        }

        .forgot a:hover {
            border-bottom-color: white;
        }

        button {
            width: 100%;
            height: 48px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }

        button:hover {
            background: #f0f0f0;
            transform: scale(1.02);
        }

        .register {
            text-align: center;
            font-size: 14px;
            color: white;
        }

        .register a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted rgba(255,255,255,0.5);
        }

        .register a:hover {
            border-bottom-color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>登录</h2>

        <div class="input-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>

        <div class="input-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>

        <div class="row-options">
            <label class="remember">
                <input type="checkbox"> 记住密码
            </label>
            <div class="forgot">
                <a href="#">忘记密码？</a>
            </div>
        </div>

        <button onclick="login()">立即登录</button>

        <div class="register">
            没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const savedUser = localStorage.getItem('username');
            const savedPass = localStorage.getItem('password');

            if ((savedUser && u === savedUser && p === savedPass) || 
                (u === '20245252' && p === '20245252')) {
                window.location.href = 'main.html';
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
