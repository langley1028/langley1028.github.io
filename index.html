<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            margin: 20px 0 30px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-weight: 500;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-img {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
        }

        .card h2 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card p {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }

        .card a {
            background: white;
            color: black;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            transition: 0.2s;
            cursor: pointer;
        }

        .card a:active {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <h1>我的个人网站</h1>
    <div class="container">
        <div class="card">
            <div class="card-img">📄</div>
            <div class="card-content">
                <h2>个人简历</h2>
                <p>基本信息 · 教育背景 · 技能</p>
            </div>
            <a href="javascript:void(0)" onclick="goToPage('resume.html')">查看</a>
        </div>
        <div class="card">
            <div class="card-img">✨</div>
            <div class="card-content">
                <h2>我的理想</h2>
                <p>成为一名靠谱的软件工程师</p>
            </div>
            <a href="javascript:void(0)" onclick="goToPage('ideal.html')">查看</a>
        </div>
        <div class="card">
            <div class="card-img">📸</div>
            <div class="card-content">
                <h2>我的生活</h2>
                <p>记录日常点滴</p>
            </div>
            <a href="javascript:void(0)" onclick="goToPage('life.html')">查看</a>
        </div>
        <div class="card">
            <div class="card-img">📚</div>
            <div class="card-content">
                <h2>学习内容</h2>
                <p>Java · Web · 数据库</p>
            </div>
            <a href="javascript:void(0)" onclick="goToPage('study.html')">查看</a>
        </div>
    </div>

    <script>
        function goToPage(page) {
            localStorage.setItem('redirectAfterLogin', page);
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
