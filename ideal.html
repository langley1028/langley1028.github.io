<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的理想</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        .content {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        ul {
            list-style-type: square;
            color: white;
            font-size: 18px;
            line-height: 2.2;
        }

        li {
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .back-link {
            margin-top: 30px;
        }

        .back-link a {
            display: inline-block;
            padding: 10px 40px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link a:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>我的理想</h1>
    <div class="content">
        <ul>
            <li>毕业后能进入一家普通IT公司，从基础开发做起</li>
            <li>踏实工作，积累项目经验，成为团队里靠谱的一员</li>
            <li>工作之余继续学习，不让自己掉队</li>
            <li>保持对技术的热情，但不过度透支身体</li>
            <li>做一个平凡但不平庸的软件工程师</li>
        </ul>
    </div>
    <div class="back-link">
        <a href="main.html">返回主界面</a>
    </div>
</body>
</html>
