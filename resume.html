<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .box {
            width: 45%;
            min-width: 280px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .box h2 {
            color: white;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        .box p {
            color: white;
            font-size: 15px;
            line-height: 1.8;
            margin: 8px 0;
            opacity: 0.9;
        }

        .back-link {
            text-align: center;
            margin-top: 40px;
        }

        .back-link a {
            display: inline-block;
            padding: 10px 40px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link a:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>个人简历</h1>
    <div class="container">
        <div class="box">
            <h2>基本信息</h2>
            <p>姓名：宁乐雯</p>
            <p>年龄：18岁</p>
            <p>籍贯：汉族</p>
            <p>邮箱：2377393864@qq.com</p>
        </div>
        <div class="box">
            <h2>教育背景</h2>
            <p>学校：中南林业科技大学</p>
            <p>专业：计算机科学与技术</p>
            <p>学历：本科</p>
            <p>时间：2024-2028</p>
        </div>
        <div class="box">
            <h2>技能特长</h2>
            <p>前端：HTML/CSS/JS</p>
            <p>后端：Java/Python</p>
            <p>数据库：SQL SERVER</p>
        </div>
        <div class="box">
            <h2>联系方式</h2>
            <p>电话：18508486353</p>
            <p>微信：18508486353</p>
            <p>QQ：2377393864</p>
        </div>
    </div>
    <div class="back-link">
        <a href="main.html">返回主界面</a>
    </div>
</body>
</html>
