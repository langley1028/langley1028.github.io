<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: 500;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            overflow: hidden;
        }

        .card {
            width: 22%;
            float: left;
            margin: 0 1.5% 25px 1.5%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card h2 {
            color: white;
            font-size: 22px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .card-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            margin: 0 auto 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }

        .card a {
            display: inline-block;
            padding: 8px 30px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }

        .card a:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        @media screen and (max-width: 900px) {
            .card {
                width: 46%;
                margin: 0 2% 25px 2%;
            }
        }

        @media screen and (max-width: 600px) {
            .card {
                width: 96%;
                margin: 0 2% 25px 2%;
                float: none;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>
    <h1>我的个人网站</h1>
    <div class="container">
        <div class="card">
            <h2>个人简历</h2>
            <div class="card-img">📄</div>
            <a href="javascript:void(0)" onclick="goToPage('resume.html')">查看</a>
        </div>
        <div class="card">
            <h2>我的理想</h2>
            <div class="card-img">✨</div>
            <a href="javascript:void(0)" onclick="goToPage('ideal.html')">查看</a>
        </div>
        <div class="card">
            <h2>我的生活</h2>
            <div class="card-img">📸</div>
            <a href="javascript:void(0)" onclick="goToPage('life.html')">查看</a>
        </div>
        <div class="card">
            <h2>学习内容</h2>
            <div class="card-img">📚</div>
            <a href="javascript:void(0)" onclick="goToPage('study.html')">查看</a>
        </div>
    </div>

    <script>
        function goToPage(page) {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                window.location.href = page;
            } else {
                sessionStorage.setItem('redirectAfterLogin', page);
                window.location.href = 'login.html';
            }
        }

    </script>
</body>
</html>
